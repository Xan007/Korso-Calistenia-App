version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: korso-postgres
    environment:
      POSTGRES_USER: korso
      POSTGRES_PASSWORD: korso_dev
      POSTGRES_DB: korso_dev
    ports:
      - "5432:5432"
    volumes:
      - korso-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U korso"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  korso-postgres-data:
